<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening Chrp…</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #070B14;
      color: #E8EAF0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 320px;
      width: 100%;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 24px;
    }
    .title {
      font-size: 22px;
      font-weight: 600;
      color: #E8EAF0;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 15px;
      color: #6B7280;
      margin-bottom: 40px;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      background: #6979F0;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .btn.visible { opacity: 1; }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(105,121,240,0.2);
      border-top-color: #6979F0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 32px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏒</div>
    <h1 class="title">Opening Chrp…</h1>
    <p class="subtitle">Finishing sign-in. If the app doesn't open automatically, tap the button below.</p>
    <div class="spinner" id="spinner"></div>
    <a id="openBtn" class="btn" href="#">Open in Chrp</a>
  </div>
  <script>
    (function () {
      var currentUrl = window.location.href;
      var deepLink = 'chrp://finishSignIn?link=' + encodeURIComponent(currentUrl);
      var btn = document.getElementById('openBtn');
      btn.href = deepLink;

      // Attempt auto-redirect immediately
      window.location.href = deepLink;

      // Show the manual button after 1.5 s as fallback
      setTimeout(function () {
        document.getElementById('spinner').style.display = 'none';
        btn.classList.add('visible');
      }, 1500);
    })();
  </script>
</body>
</html>
